name: Deploy AeganMedia Montage

on:
  push:
    branches: [main, feature/development]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.HOST }}" ] && missing="$missing HOST"
          [ -z "${{ secrets.USERNAME }}" ] && missing="$missing USERNAME"
          [ -z "${{ secrets.PASSWORD }}" ] && missing="$missing PASSWORD"
          [ -z "${{ secrets.MONGODB_URI }}" ] && missing="$missing MONGODB_URI"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Build Docker image
        run: docker build -t aeganmediamontage-web:latest .

      - name: Save Docker image
        run: docker save aeganmediamontage-web:latest -o aeganmediamontage-web.tar

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            mkdir -p /home/${{ secrets.USERNAME }}/aeganmediamontage/tmp
            chmod 777 /home/${{ secrets.USERNAME }}/aeganmediamontage/tmp

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "aeganmediamontage-web.tar"
          target: "/home/${{ secrets.USERNAME }}/aeganmediamontage/tmp"
          tar_tmp_path: "/home/${{ secrets.USERNAME }}/aeganmediamontage/tmp"

      - name: Copy deployment scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker/"
          target: "/home/${{ secrets.USERNAME }}/aeganmediamontage"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/${{ secrets.USERNAME }}/aeganmediamontage

            # Write .env
            cat <<'ENVEOF' > /var/aeganmediamontage/.env
            APP_NAME=AeganMediaMontage
            HOST=0.0.0.0
            PORT=41006
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXP_MINUTES=1440
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DB=aeganmediamontage
            VIDEOS_ROOT=/var/aeganmediamontage/videos
            VIDEO_RETENTION_HOURS=48
            INIT_DB_ON_BOOT=false
            INIT_SEED_USERS=true
            SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
            SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
            SEED_MANAGER_EMAIL=${{ secrets.SEED_MANAGER_EMAIL }}
            SEED_MANAGER_PASSWORD=${{ secrets.SEED_MANAGER_PASSWORD }}
            SEED_USER_EMAIL=${{ secrets.SEED_USER_EMAIL }}
            SEED_USER_PASSWORD=${{ secrets.SEED_USER_PASSWORD }}
            CREDIT_COST_PER_RUN=1
            FREE_TIER_MAX_RUNS=1
            FREE_TIER_MAX_DURATION=10
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            PIPELINE_RUN_COMMAND=python -m webapp.pipeline_runner --pipeline {pipeline} --project {project_id} --prompt-file {prompt_file}
            WORKER_POLL_SECONDS=5
            WORKER_TIMEOUT_SECONDS=10800
            ENVEOF

            # Pre-deploy cleanup
            chmod +x docker/pre-deploy.sh
            bash docker/pre-deploy.sh

            # Load new image
            docker load -i tmp/aeganmediamontage-web.tar
            rm -f tmp/aeganmediamontage-web.tar

            # Create shared directories
            mkdir -p /var/aeganmediamontage/videos
            mkdir -p /var/aeganmediamontage/projects

            # Run web app (exposed on 41006 for your external Nginx to proxy)
            docker run -d \
              --name aeganmediamontage-web \
              --restart unless-stopped \
              --env-file /var/aeganmediamontage/.env \
              -p 41006:41006 \
              -v /var/aeganmediamontage/videos:/var/aeganmediamontage/videos \
              -v /var/aeganmediamontage/projects:/app/projects \
              --security-opt no-new-privileges \
              --cap-drop ALL \
              --tmpfs /tmp:rw,noexec,nosuid,size=512m \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              aeganmediamontage-web:latest

            # Run worker
            docker run -d \
              --name aeganmediamontage-worker \
              --restart unless-stopped \
              --env-file /var/aeganmediamontage/.env \
              -v /var/aeganmediamontage/videos:/var/aeganmediamontage/videos \
              -v /var/aeganmediamontage/projects:/app/projects \
              --security-opt no-new-privileges \
              --cap-drop ALL \
              --tmpfs /tmp:rw,noexec,nosuid,size=512m \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              aeganmediamontage-web:latest \
              python -m webapp.worker

            echo "Deployment complete"
            docker ps --filter "name=aeganmediamontage"
