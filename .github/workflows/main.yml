name: Deploy AeganMedia Montage

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/development

jobs:
  deploy:
    name: Build and Deploy Containers
    runs-on: ubuntu-22.04
    environment: development
    env:
      APP_IMAGE: aeganmediamontage-web
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        env:
          HOST_SECRET: ${{ secrets.HOST }}
          USERNAME_SECRET: ${{ secrets.USERNAME }}
          PASSWORD_SECRET: ${{ secrets.PASSWORD }}
          PORT_SECRET: ${{ secrets.SSH_PORT }}
          MONGODB_SECRET: ${{ secrets.MONGODB_URI }}
        run: |
          missing=0
          [ -z "$HOST_SECRET" ] && echo "Missing GitHub secret: HOST" && missing=1
          [ -z "$USERNAME_SECRET" ] && echo "Missing GitHub secret: USERNAME" && missing=1
          [ -z "$PASSWORD_SECRET" ] && echo "Missing GitHub secret: PASSWORD" && missing=1
          [ -z "$PORT_SECRET" ] && echo "Missing GitHub secret: SSH_PORT" && missing=1
          [ -z "$MONGODB_SECRET" ] && echo "Missing GitHub secret: MONGODB_URI" && missing=1
          if [ "$missing" -ne 0 ]; then
            echo "Please configure deployment connection secrets in the 'development' environment."
            exit 1
          fi

      - name: Build Docker image
        run: docker build -t ${APP_IMAGE}:${IMAGE_TAG} .

      - name: Export Docker image tar
        run: |
          docker save -o ${APP_IMAGE}-${IMAGE_TAG}.tar ${APP_IMAGE}:${IMAGE_TAG}
          chmod 644 ${APP_IMAGE}-${IMAGE_TAG}.tar

      - name: Verify tar file
        run: |
          ls -l ${APP_IMAGE}-${IMAGE_TAG}.tar
          test -r ${APP_IMAGE}-${IMAGE_TAG}.tar

      - name: Prepare remote upload directory
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p /tmp/aeganmedia-deploy
            mkdir -p /tmp/aeganmedia-scp-tmp
            chmod 755 /tmp/aeganmedia-deploy
            chmod 700 /tmp/aeganmedia-scp-tmp

      - name: Copy Docker image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "${{ env.APP_IMAGE }}-${{ env.IMAGE_TAG }}.tar"
          target: "/tmp/aeganmedia-deploy/"
          overwrite: true
          tar_tmp_path: "/tmp/aeganmedia-scp-tmp"
          debug: true

      - name: Copy deployment scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker/"
          target: "/tmp/aeganmedia-deploy/"
          overwrite: true
          tar_tmp_path: "/tmp/aeganmedia-scp-tmp"

      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e

            # Create app directories (user-owned, no sudo needed)
            mkdir -p /var/aeganmediamontage/videos
            mkdir -p /var/aeganmediamontage/projects

            # Write .env file
            cat > /var/aeganmediamontage/.env << 'ENVEOF'
            APP_NAME=AeganMediaMontage
            HOST=0.0.0.0
            PORT=41006
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXP_MINUTES=1440
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DB=aeganmediamontage
            VIDEOS_ROOT=/var/aeganmediamontage/videos
            VIDEO_RETENTION_HOURS=48
            INIT_DB_ON_BOOT=false
            INIT_SEED_USERS=true
            SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
            SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
            SEED_MANAGER_EMAIL=${{ secrets.SEED_MANAGER_EMAIL }}
            SEED_MANAGER_PASSWORD=${{ secrets.SEED_MANAGER_PASSWORD }}
            SEED_USER_EMAIL=${{ secrets.SEED_USER_EMAIL }}
            SEED_USER_PASSWORD=${{ secrets.SEED_USER_PASSWORD }}
            CREDIT_COST_PER_RUN=1
            FREE_TIER_MAX_RUNS=1
            FREE_TIER_MAX_DURATION=10
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            PIPELINE_RUN_COMMAND=python -m webapp.pipeline_runner --pipeline {pipeline} --project {project_id} --prompt-file {prompt_file}
            WORKER_POLL_SECONDS=5
            WORKER_TIMEOUT_SECONDS=10800
            ENVEOF

            # Remove leading spaces from .env file
            sed -i 's/^[[:space:]]*//' /var/aeganmediamontage/.env

            # Load new Docker image
            docker load -i "/tmp/aeganmedia-deploy/${{ env.APP_IMAGE }}-${{ env.IMAGE_TAG }}.tar"

            # Stop and remove previous containers
            docker stop aeganmediamontage-web >/dev/null 2>&1 || true
            docker stop aeganmediamontage-worker >/dev/null 2>&1 || true
            docker rm -f aeganmediamontage-web >/dev/null 2>&1 || true
            docker rm -f aeganmediamontage-worker >/dev/null 2>&1 || true

            # Remove old images (keep current tag)
            docker images --format '{{.Repository}}:{{.Tag}}' | awk '
              $1 ~ /^aeganmediamontage-web:/ && $1 !~ /:${{ env.IMAGE_TAG }}$/ { print $1 }
            ' | xargs -r docker rmi -f || true

            # Remove dangling image layers
            docker image prune -f || true

            # Run web app
            docker run -d \
              --name aeganmediamontage-web \
              --restart unless-stopped \
              --env-file /var/aeganmediamontage/.env \
              -p 41006:41006 \
              -v /var/aeganmediamontage/videos:/var/aeganmediamontage/videos \
              -v /var/aeganmediamontage/projects:/app/projects \
              --security-opt no-new-privileges \
              --cap-drop ALL \
              --tmpfs /tmp:rw,noexec,nosuid,size=512m \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              ${{ env.APP_IMAGE }}:${{ env.IMAGE_TAG }}

            # Run worker
            docker run -d \
              --name aeganmediamontage-worker \
              --restart unless-stopped \
              --env-file /var/aeganmediamontage/.env \
              -v /var/aeganmediamontage/videos:/var/aeganmediamontage/videos \
              -v /var/aeganmediamontage/projects:/app/projects \
              --security-opt no-new-privileges \
              --cap-drop ALL \
              --tmpfs /tmp:rw,noexec,nosuid,size=512m \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              ${{ env.APP_IMAGE }}:${{ env.IMAGE_TAG }} \
              python -m webapp.worker

            # Health check
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:41006/health >/dev/null; then
                echo "Health check passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health check failed after retries."
                docker logs --tail 100 aeganmediamontage-web || true
                docker logs --tail 100 aeganmediamontage-worker || true
                exit 1
              fi
              sleep 2
            done

            # Cleanup tar files
            rm -f "/tmp/aeganmedia-deploy/${{ env.APP_IMAGE }}-${{ env.IMAGE_TAG }}.tar"

            echo "Deployment complete"
            docker ps --filter "name=aeganmediamontage"
