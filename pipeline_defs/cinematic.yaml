name: cinematic
version: "3.0"
description: >
  Cinematic Video — provide a reference video URL and/or custom audio file.
  Google AI analyzes the reference style, transcribes your audio sentence-by-sentence,
  extracts characters and scenes, generates matching AI images (Imagen 4), and
  composes a cinematic video with audio-synced timing and smooth transitions.
  Best for story videos, short films, and reference-style matching.
category: cinematic
stability: production
