<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img src="/static/img/logoText.svg" alt="Aegan Media" />
    </a>
    <nav>
      <a href="/" class="{% if request.url.path == '/' %}nav-active{% endif %}">Home</a>
      {% if current_user %}
        <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}nav-active{% endif %}">Dashboard</a>
        {% if current_user.role in ["admin", "manager"] %}
          <a href="/admin-dashboard" class="{% if request.url.path == '/admin-dashboard' %}nav-active{% endif %}">Admin</a>
        {% endif %}
        <form method="post" action="/logout" class="inline-form">
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="/login" class="{% if request.url.path == '/login' %}nav-active{% endif %}">Login</a>
        <a href="/signup" class="{% if request.url.path == '/signup' %}nav-active{% endif %}">Signup</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>&copy; 2026 AeganMedia &middot; Powered by OpenMontage</p>
  </footer>
</body>
</html>
