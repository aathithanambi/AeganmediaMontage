{% extends "base.html" %}
{% block content %}
<section class="card narrow">
  <h1>Forgot Password</h1>
  {% if message %}<p class="ok">{{ message }}</p>{% endif %}
  <form method="post" action="/forgot-password">
    <label>Email</label>
    <input type="email" name="email" required />
    <button type="submit">Request Reset</button>
  </form>
</section>
{% endblock %}
